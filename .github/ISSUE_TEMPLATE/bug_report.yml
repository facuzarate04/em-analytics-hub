name: Bug Report
description: Report a bug in em-analytics-hub
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this issue?
      placeholder: |
        1. Install em-analytics-hub
        2. Configure...
        3. Navigate to...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: runtime
    attributes:
      label: Runtime
      options:
        - Cloudflare Workers
        - Node.js (self-hosted)
        - Both
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Plugin version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: emdash-version
    attributes:
      label: EmDash version
      placeholder: "0.1.0"

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, logs, or screenshots.
